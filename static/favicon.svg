<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#252540"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Eye shape (outer) -->
  <path d="M20 64 C20 64, 44 32, 64 32 C84 32, 108 64, 108 64 C108 64, 84 96, 64 96 C44 96, 20 64, 20 64Z" fill="none" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Iris -->
  <circle cx="64" cy="64" r="18" fill="none" stroke="#ff6b6b" stroke-width="5"/>
  <!-- Pupil / focus point (the ORP dot) -->
  <circle cx="64" cy="64" r="6" fill="#ff6b6b"/>
  <!-- Speed lines (left) -->
  <line x1="10" y1="56" x2="28" y2="56" stroke="#888888" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="6" y1="64" x2="20" y2="64" stroke="#888888" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="10" y1="72" x2="28" y2="72" stroke="#888888" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- ORP guide marks (top and bottom) -->
  <line x1="64" y1="24" x2="64" y2="30" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="64" y1="98" x2="64" y2="104" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
